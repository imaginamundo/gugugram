<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js"> <!--<![endif]-->
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>gugugram</title>
        <meta name="description" content="Compartilhe pequenas fotos de forma rápida :D">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" type="text/css" href="asset/css/main.css">
    </head>
    <body>
        
        <header class="main-header">
            <div class="container">
                <a href="/"><img src="asset/image/logo.png" alt="gugugram" /></a>
            </div>
        </header>

        <div class="container">
            <form class="input-form" action="" method="POST">
                <label class="btn-upload" for="upload-photo" for="upload-photo">
                    Enviar foto
                    <small>(você pode arrastar uma fota pra ca, se quiser)</small>
                </label>
                <input type="file" id="upload-photo" name="upload-photo" accept="image/*" />
            </form>

            <div class="row">
                <div class="photos">
                    <div class="photos-container">
                        <p>Nenhuma foto até o momento 😢</p>
                    </div>
                </div>

                <div class="special-infos">
                    <div class="special-infos-container">
                        <h2>Estatísticas show</h2>
                        <p>
                            Foram enviadas
                            {{:número}}
                            fotos para o
                            <b>gugu<sup>gram</sup></b>.
                        </p>
                        <p>Eu não quero colocar mais estatísticas aqui, quem sabe no futuro.</p>

                        <hr />

                        <p>
                            Esse projeto é oferecido pela equipe <a href="http://www.gugu.space/" target="_blank">gugu</a>.
                        </p>
                        <p class="fbi-logo">
                            <a href="https://www.fbi.gov/" target="_blank">
                                <img src="asset/image/fbi.png" alt="FBI" />
                            </a>
                        </p>
                        
                    </div>
                </div>
            </div>
        </div>


        <div class="file-drop">
            <div class="file-drop-container">
                <h3>Joga a fota aqui</h3>
                <i class="icon-plus"> </i>
            </div>
        </div>
    </body>
</html>
